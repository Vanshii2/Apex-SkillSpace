    <!-- Immediate Theme Helper -->
    <script>
        (function () {
            // Determine username from URL
            const params = new URLSearchParams(window.location.search);
            const userParam = params.get('user') || 'current';
            let data = null;
            if (userParam === 'current') {
                const saved = localStorage.getItem('apex-portfolio');
                if (saved) data = JSON.parse(saved);
            }
            let isLight = false;
            if (data) {
                if (data.selectedTemplate !== 'custom') {
                    const tId = data.selectedTemplate || 'minimal';
                    if (tId === 'minimal') isLight = true;
                } else if (data.customTheme) {
                    const ct = data.customTheme;
                    const bgSolid = ct.backgroundSolid;
                    const bgGradStart = ct.backgroundGradientStart;
                    const bgType = ct.backgroundType || 'solid';
                    const currentBg = bgType === 'solid' ? bgSolid : bgGradStart;
                    if (currentBg) {
                        let cleanHex = currentBg.trim().replace('#', '');
                        if (cleanHex.length === 3) {
                            cleanHex = cleanHex.split('').map(c => c + c).join('');
                        }
                        if (cleanHex.length === 6) {
                            const r = parseInt(cleanHex.substring(0, 2), 16);
                            const g = parseInt(cleanHex.substring(2, 4), 16);
                            const b = parseInt(cleanHex.substring(4, 6), 16);
                            const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
                            isLight = luminance > 140;
                        }
                    }
                }
                document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');
            } else {
                const savedTheme = localStorage.getItem('fpm_theme') || 'dark';
                document.documentElement.setAttribute('data-theme', savedTheme);
            }
        })();
    </script>

    <!-- Script to load, fetch, and style dynamic portfolios -->
    <script type="module">
        import { initDB, getCreators, getProjects } from './js/modules/db.js';

        // Make sure DB is loaded in LocalStorage
        initDB();

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const username = urlParams.get('user') || 'current';

            let data = null;

            if (username === 'current') {
                const exitBtn = document.querySelector('a[href="showcase.html"]');
                if (exitBtn) {
                    exitBtn.href = 'portfolio.html';
                    exitBtn.innerHTML = '<i data-lucide="arrow-left" style="width: 14px; height: 14px;"></i> Back to Builder';
                    if (window.lucide) window.lucide.createIcons();
                }
                const saved = localStorage.getItem('apex-portfolio');
                if (saved) {
                    data = JSON.parse(saved);
                } else {
                    // Fallback to active session
                    const activeSession = JSON.parse(localStorage.getItem('fpm_user_session') || 'null');
                    if (activeSession) {
                        data = {
                            name: activeSession.name,
                            role: 'Creator & UI Designer',
                            tagline: 'Designing premium interfaces and future-proof digital spaces.',
                            location: 'San Francisco, CA',
                            about: activeSession.bio,
                            photo: activeSession.avatar,
                            skills: activeSession.skills,
                            experience: [],
                            education: [],
                            projects: [],
                            certifications: [],
                            testimonials: [],
                            socialLinks: { github: activeSession.username },
                            selectedTemplate: 'glass'
                        };
                    }
                }
            } else {
                const creators = getCreators();
                const creator = creators.find(c => c.username === username);
                if (creator) {
                    data = {
                        name: creator.name,
                        role: creator.role || 'Creative Developer',
                        tagline: creator.tagline || 'Designing premium interfaces and future-proof digital spaces.',
                        location: creator.location || (creator.username === 'hyper_arch' ? 'London, UK' : (creator.username === 'linear_flow' ? 'Berlin, DE' : 'San Francisco, CA')),
                        about: creator.bio,
                        photo: creator.avatar,
                        skills: creator.skills,
                        experience: creator.experience || [],
                        education: creator.education || [
                            { school: 'Apex Design Academy', degree: 'Advanced UI Design Certification', startDate: '2022', endDate: '2023' },
                            { school: 'University of Digital Arts', degree: 'B.S. Interaction Science', startDate: '2018', endDate: '2022' }
                        ],
                        projects: creator.projects || [],
                        certifications: creator.certifications || [
                            { title: 'Certified Webflow Developer', issuer: 'Webflow Academy', date: '2024-05', link: '#' },
                            { title: 'Human-Computer Interaction Expert', issuer: 'Interaction Design Foundation', date: '2023-11', link: '#' }
                        ],
                        testimonials: creator.testimonials || [
                            { name: 'Elena Rostova', role: 'Design Lead at Stripe', quote: `${creator.name} is a brilliant UI engineer. Their eye for detail and animations brought our project to life.` },
                            { name: 'Devon Keir', role: 'CTO at Vercel Labs', quote: `Incredibly clean HTML & Javascript structure. Delivery was flawless and ahead of schedule.` }
                        ],
                        phone: creator.phone || '',
                        email: creator.email || '',
                        websiteUrl: creator.websiteUrl || '',
                        socialLinks: creator.socialLinks || {},
                        selectedTemplate: creator.selectedTemplate || 'minimal',
                        customTheme: creator.customTheme || null,
                        sectionVisibility: creator.sectionVisibility || null,
                        username: creator.username
                    };
                }
            }

            if (!data) {
                document.getElementById('portfolio-root').innerHTML = `
                    <div style="text-align: center; padding: 120px 24px;">
                        <h2 style="font-size:2rem; margin-bottom: 16px;">Portfolio Not Found</h2>
                        <p style="color:var(--text-secondary);">The portfolio data could not be retrieved from local storage or creator seeds.</p>
                        <a href="showcase.html" class="btn btn-primary clickable" style="margin-top:24px; display:inline-block; text-decoration:none;">Go back to Showcase</a>
                    </div>
                `;
                if (window.lucide) window.lucide.createIcons();
                return;
            }

            // Load Template Config
            let template = null;
            let isCustom = data.selectedTemplate === 'custom';

            if (data.selectedTemplate !== 'custom') {
                try {
                    const response = await fetch(`templates/${data.selectedTemplate || 'minimal'}.json`);
                    template = await response.json();
                } catch (err) {
                    console.error('Failed to load template file, using default minimal styling', err);
                    template = {
                        font: 'Inter',
                        colors: { background: '#ffffff', text: '#111111', accent: '#0066cc' },
                        sections: { photo: true, about: true, skills: true, experience: true, projects: true, contact: true },
                        cardStyle: 'flat',
                        layout: 'centered'
                    };
                }
            } else {
                const ct = data.customTheme || {};
                let userAccent = ct.accent || '#111111';
                if (userAccent === '#00ffaa' || userAccent === '#00FFAA' || userAccent === '#dc2626') {
                    userAccent = '#111111';
                }
                template = {
                    font: ct.font || 'Inter',
                    colors: {
                        background: ct.backgroundType === 'solid' ? ct.backgroundSolid : ct.backgroundGradientStart,
                        text: ct.text || '#ffffff',
                        accent: userAccent
                    },
                    sections: data.sectionVisibility || { photo: true, about: true, skills: true, experience: true, education: true, projects: true, certifications: true, testimonials: true, contact: true },
                    cardStyle: ct.cardStyle || 'glassmorphism',
                    layout: ct.layout || 'centered',
                    avatarShape: ct.avatarShape || 'circle'
                };
            }

            // Inject styles dynamically based on template config
            injectTemplateStyles(template, isCustom, data.customTheme);

            // Apply layout class to root
            const layoutClass = isCustom
                ? (data.customTheme && data.customTheme.layout ? data.customTheme.layout : 'centered')
                : (template.layout || 'centered');
            const portfolioRoot = document.getElementById('portfolio-root');
            if (portfolioRoot) {
                portfolioRoot.className = `layout-${layoutClass}`;
            }

            // Populate text elements
            document.title = `${data.name} // Professional Portfolio`;
            document.getElementById('portfolio-name').textContent = data.name;
            document.getElementById('portfolio-role').textContent = data.role;

            const taglineEl = document.getElementById('portfolio-tagline');
            if (data.tagline) {
                taglineEl.textContent = data.tagline;
                taglineEl.style.display = 'block';
            } else {
                taglineEl.style.display = 'none';
            }

            const locEl = document.getElementById('portfolio-location');
            const locTextEl = document.getElementById('portfolio-location-text');
            if (data.location && locTextEl) {
                locTextEl.textContent = data.location;
                locEl.style.display = 'inline-flex';
            } else {
                locEl.style.display = 'none';
            }

            const aboutEl = document.getElementById('portfolio-about');
            if (aboutEl) aboutEl.textContent = data.about;

            // Connect Quick Connect Row
            const quickConnectEl = document.getElementById('portfolio-quickconnect');
            if (quickConnectEl) {
                let connHtml = '';
                const links = data.socialLinks || {};
                if (data.email) connHtml += `<a href="mailto:${data.email}" class="social-anchor">Email</a>`;
                if (data.phone) connHtml += `${connHtml ? '<span style="opacity:0.3;">|</span>' : ''} <span class="social-anchor" style="cursor:default;">${data.phone}</span>`;
                if (data.websiteUrl) connHtml += `${connHtml ? '<span style="opacity:0.3;">|</span>' : ''} <a href="${data.websiteUrl}" class="social-anchor" target="_blank">Website</a>`;
                if (links.github) connHtml += `${connHtml ? '<span style="opacity:0.3;">|</span>' : ''} <a href="${normaliseSocialUrl('github', links.github)}" class="social-anchor" target="_blank">GitHub</a>`;
                if (links.linkedin) connHtml += `${connHtml ? '<span style="opacity:0.3;">|</span>' : ''} <a href="${normaliseSocialUrl('linkedin', links.linkedin)}" class="social-anchor" target="_blank">LinkedIn</a>`;
                if (links.twitter) connHtml += `${connHtml ? '<span style="opacity:0.3;">|</span>' : ''} <a href="${normaliseSocialUrl('twitter', links.twitter)}" class="social-anchor" target="_blank">Twitter</a>`;
                quickConnectEl.innerHTML = connHtml;
            }

            // Avatar Photo
            const avatarImg = document.getElementById('portfolio-avatar');
            if (data.photo) {
                avatarImg.src = data.photo;
                avatarImg.style.display = 'block';
            } else {
                avatarImg.style.display = 'none';
            }

            // Skills badges
            const skillsBox = document.getElementById('portfolio-skills');
            if (data.skills && data.skills.length > 0) {
                skillsBox.innerHTML = data.skills.map(s => `<span class="port-skill-badge">${s}</span>`).join('');
            } else {
                document.getElementById('sec-skills').style.display = 'none';
            }

            const isLight = document.documentElement.getAttribute('data-theme') === 'light';
            const accent = template.colors.accent || (isLight ? '#111111' : '#ffffff');

            // Experience Timeline
            const expTimeline = document.getElementById('portfolio-experience');
            if (data.experience && data.experience.length > 0) {
                expTimeline.innerHTML = data.experience.map(e => `
                    <div class="timeline-card">
                        <div class="card-icon-container" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: ${isLight ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.06)'}; color: ${accent}; flex-shrink: 0;">
                            <i data-lucide="briefcase" style="width: 18px; height: 18px;"></i>
                        </div>
                        <div class="timeline-header">
                            <h4 class="timeline-title">${e.title}</h4>
                            <span class="timeline-company">${e.company}</span>
                            <div class="timeline-date">${formatDateString(e.startDate)} – ${formatDateString(e.endDate)}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('sec-experience').style.display = 'none';
            }

            // Education Timeline
            const eduTimeline = document.getElementById('portfolio-education');
            if (data.education && data.education.length > 0) {
                eduTimeline.innerHTML = data.education.map(ed => `
                    <div class="timeline-card">
                        <div class="card-icon-container" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: ${isLight ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.06)'}; color: ${accent}; flex-shrink: 0;">
                            <i data-lucide="graduation-cap" style="width: 18px; height: 18px;"></i>
                        </div>
                        <div class="timeline-header">
                            <h4 class="timeline-title">${ed.degree}</h4>
                            <span class="timeline-company">${ed.school}</span>
                            <div class="timeline-date">${formatDateString(ed.startDate)} – ${formatDateString(ed.endDate)}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('sec-education').style.display = 'none';
            }

            // Projects author matching
            const projectsGrid = document.getElementById('portfolio-projects');
            const allProjects = getProjects();
            const savedProjects = Array.isArray(data.projects) ? data.projects : [];
            const matchingProjects = savedProjects.length
                ? savedProjects
                : allProjects.filter(p => p.seller === data.username || p.seller === username || (username === 'current' && p.seller === 'apex_user'));

            if (matchingProjects.length > 0) {
                projectsGrid.innerHTML = matchingProjects.map(p => `
                    <div class="port-project-card" style="cursor: ${p.link ? 'pointer' : 'default'};" ${p.link ? `onclick="window.open('${p.link}', '_blank')"` : ''}>
                        <img src="${p.image || 'assets/right2.jpg'}" alt="${p.title}" class="port-proj-img">
                        <div class="port-proj-content">
                            <span class="port-proj-status">${p.status || 'Demo Project'}</span>
                            <h3 class="port-proj-title">${p.title}</h3>
                            <p class="port-proj-desc">${p.description}</p>
                            ${p.link ? `<a href="${p.link}" target="_blank" style="font-size:0.75rem; color:inherit; text-decoration:underline; display:inline-block; margin-top:8px; margin-bottom:8px;" onclick="event.stopPropagation();">View Link &rarr;</a>` : ''}
                            <div style="display:flex; gap:8px; flex-wrap:wrap; margin-top:12px;">
                                ${(p.tags || []).slice(0, 3).map(t => `<span class="port-skill-badge" style="font-size:0.65rem; padding: 3px 8px;">${t}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('sec-projects').style.display = 'none';
            }

            // Certifications
            const certsTimeline = document.getElementById('portfolio-certifications');
            if (data.certifications && data.certifications.length > 0) {
                certsTimeline.innerHTML = data.certifications.map(c => `
                    <div class="timeline-card">
                        <div class="card-icon-container" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: ${isLight ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.06)'}; color: ${accent}; flex-shrink: 0;">
                            <i data-lucide="award" style="width: 18px; height: 18px;"></i>
                        </div>
                        <div class="timeline-header">
                            <h4 class="timeline-title">${c.title}</h4>
                            <span class="timeline-company">${c.issuer}</span>
                            <div class="timeline-date">${c.date}</div>
                            ${c.link ? `<a href="${c.link}" target="_blank" style="font-size:0.75rem; color:inherit; text-decoration:underline; display:inline-block; margin-top:6px;">Verify Credentials &rarr;</a>` : ''}
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('sec-certifications').style.display = 'none';
            }

            // Testimonials
            const testimonialsTimeline = document.getElementById('portfolio-testimonials');
            if (data.testimonials && data.testimonials.length > 0) {
                testimonialsTimeline.innerHTML = data.testimonials.map(t => `
                    <div class="timeline-card" style="align-items: flex-start;">
                        <div class="card-icon-container" style="width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: ${isLight ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.06)'}; color: ${accent}; flex-shrink: 0; margin-top: 2px;">
                            <i data-lucide="quote" style="width: 16px; height: 16px;"></i>
                        </div>
                        <div style="flex: 1; min-width: 0;">
                            <p style="font-style:italic; font-size:0.95rem; line-height:1.6; margin:0 0 12px 0; color:inherit;">"${t.quote}"</p>
                            <div style="font-weight:600; font-size:0.9rem; color:inherit;">${t.name}</div>
                            <div style="font-size:0.8rem; opacity:0.75; margin-top:2px; color:inherit;">${t.role}</div>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('sec-testimonials').style.display = 'none';
            }

            // Handle Section Visibilities
            const visibility = isCustom ? (data.sectionVisibility || {}) : (template.sections || {});
            const secs = ['photo', 'about', 'skills', 'experience', 'education', 'projects', 'certifications', 'testimonials'];
            secs.forEach(sec => {
                const element = document.getElementById(`sec-${sec}`);
                if (element) {
                    let hasContent = true;
                    if (sec === 'skills') {
                        hasContent = data.skills && data.skills.length > 0;
                    } else if (sec === 'experience') {
                        hasContent = data.experience && data.experience.length > 0;
                    } else if (sec === 'education') {
                        hasContent = data.education && data.education.length > 0;
                    } else if (sec === 'projects') {
                        hasContent = data.projects && data.projects.length > 0;
                    } else if (sec === 'certifications') {
                        hasContent = data.certifications && data.certifications.length > 0;
                    } else if (sec === 'testimonials') {
                        hasContent = data.testimonials && data.testimonials.length > 0;
                    } else if (sec === 'about') {
                        hasContent = data.about && data.about.trim() !== '' &&
                            !data.about.trim().startsWith('Tell your') &&
                            !data.about.trim().startsWith('Describe your') &&
                            !data.about.trim().startsWith('Add your');
                    } else if (sec === 'photo') {
                        hasContent = !!data.photo;
                    }
                    const visible = visibility[sec] !== false;
                    element.style.display = (visible && hasContent) ? 'flex' : 'none';
                }
            });

            // Contact form submit handling
            const contactForm = document.getElementById('contact-form');
            if (contactForm) {
                contactForm.addEventListener('submit', (e) => {
                    e.preventDefault();
                    // Mock submission success response
                    const successMsg = document.getElementById('contact-success');
                    if (successMsg) {
                        successMsg.style.display = 'flex';
                        contactForm.reset();
                        setTimeout(() => {
                            successMsg.style.display = 'none';
                        }, 5000);
                    }
                });
            }

            // Initialize Lucide Icons
            if (window.lucide) {
                window.lucide.createIcons();
            }

            // Remove transitions override to re-enable them for hover events
            setTimeout(() => {
                const foucStyle = document.getElementById('fouc-preload');
                if (foucStyle) foucStyle.remove();
            }, 50);
        });

        function normaliseSocialUrl(platform, value) {
            if (/^https?:\/\//i.test(value)) return value;
            const handle = value.replace(/^@/, '');
            const bases = {
                github: 'https://github.com/',
                linkedin: 'https://linkedin.com/in/',
                twitter: 'https://twitter.com/'
            };
            return `${bases[platform]}${handle}`;
        }

        function formatDateString(dateStr) {
            if (!dateStr) return '';
            if (dateStr.toLowerCase() === 'present') return 'Present';
            
            const parts = dateStr.split('-');
            if (parts.length === 1) {
                return dateStr;
            }
            
            const year = parts[0];
            const monthIndex = parseInt(parts[1], 10) - 1;
            
            const monthNames = [
                'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun',
                'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'
            ];
            
            const monthName = monthNames[monthIndex] || parts[1];
            const yy = year.length >= 4 ? year.slice(-2) : year;
            
            if (parts.length >= 3) {
                const day = parseInt(parts[2], 10);
                const dd = day < 10 ? '0' + day : day.toString();
                return `${dd}/${monthName}/${yy}`;
            }
            
            return `${monthName}/${yy}`;
        }

        // Helper to calculate relative luminance of a hex color
        function isColorLight(hex) {
            if (!hex) return false;
            let cleanHex = hex.trim().replace('#', '');
            if (cleanHex.length === 3) {
                cleanHex = cleanHex.split('').map(c => c + c).join('');
            }
            if (cleanHex.length !== 6) return false;

            const r = parseInt(cleanHex.substring(0, 2), 16);
            const g = parseInt(cleanHex.substring(2, 4), 16);
            const b = parseInt(cleanHex.substring(4, 6), 16);

            // Relative luminance formula: 0.2126 * R + 0.7152 * G + 0.0722 * B
            const luminance = 0.2126 * r + 0.7152 * g + 0.0722 * b;
            return luminance > 140;
        }

        // Helper to convert hex to rgba
        function hexToRgba(hex, alpha) {
            if (!hex) return `rgba(255,255,255,${alpha})`;
            let cleanHex = hex.trim().replace('#', '');
            if (cleanHex.length === 3) {
                cleanHex = cleanHex.split('').map(c => c + c).join('');
            }
            if (cleanHex.length !== 6) return `rgba(255,255,255,${alpha})`;
            const r = parseInt(cleanHex.substring(0, 2), 16);
            const g = parseInt(cleanHex.substring(2, 4), 16);
            const b = parseInt(cleanHex.substring(4, 6), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // --- EDS-ready shared CSS generator ---
        // Same logic as buildPortfolioCSS() in portfolio-builder.js.
        // Selectors are adapted for view-portfolio.html element structure.
        function buildPortfolioCSS(sel, tok) {
            const {
                font, fontSize, accent, text, cardStyle, dividerStyle,
                bgStyle, bgIsImage, isLight, isCustom, isCreativeA4,
                cardBg, cardBorder, cardShadow, blur, hexToRgba, cardBgColor,
                avatarShape, layout
            } = tok;

            const s = sel.scope;
            const isCentered = layout === 'centered' || !layout;

            return `
                ${s} ${sel.heroSelector} {
                    display: flex; flex-direction: column;
                    align-items: ${ isCentered ? 'center' : 'flex-start' } !important;
                    text-align: ${ isCentered ? 'center' : 'left' } !important;
                }
                ${s} ${sel.nameSelector} {
                    font-size: 1.85em; font-weight: 700;
                    color: ${text};
                    margin: 0 0 0.5em 0; letter-spacing: -0.02em;
                }
                ${s} ${sel.roleSelector} {
                    font-size: 0.8em; color: ${accent};
                    font-family: var(--font-mono); text-transform: uppercase;
                    letter-spacing: 0.1em; margin: 0;
                }
                ${s} ${sel.locationBadgeSelector} { color: ${accent}dd; border: 1px solid ${accent}25; background: ${accent}0a; }
                ${s} ${sel.aboutSelector} { font-size: 0.9em; line-height: 1.7; color: ${text}dd; margin: 0; }
                ${s} ${sel.sectionTitleSelector} {
                    font-size: 1em; font-weight: 600; margin: 0; letter-spacing: -0.01em; color: ${text};
                    border-bottom: ${dividerStyle === 'none' ? 'none' : `2px ${dividerStyle} ${accent}25`};
                    padding-bottom: 0.625em;
                }
                ${s} ${sel.sectionContainerSelector} {
                    display: flex; flex-direction: column; gap: 1.25em;
                    padding: 2em; border-radius: 1.125em;
                    background: ${cardBg}; border: ${cardBorder};
                    box-shadow: ${cardShadow};
                    backdrop-filter: blur(${blur}); -webkit-backdrop-filter: blur(${blur});
                }
                ${s} ${sel.skillSelector} {
                    padding: 0.3em 0.75em; border-radius: 99px; font-size: 0.75em; font-weight: 500;
                    background: ${isCustom ? hexToRgba(accent,'0.08') : (isLight ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.06)')} !important;
                    color: ${isCustom ? accent : (isLight ? '#111111' : '#ffffff')} !important;
                    border: 1px solid ${isCustom ? hexToRgba(accent,'0.25') : (isLight ? 'rgba(0,0,0,0.08)' : 'rgba(255,255,255,0.12)')} !important;
                    font-family: var(--font-mono);
                }
                ${s} ${sel.expItemSelector} {
                    padding: 1em; border-radius: 0.75em;
                    background: ${isCustom ? hexToRgba(cardBgColor,'0.9') : (isLight ? 'rgba(255,255,255,0.65)' : 'rgba(255,255,255,0.035)')} !important;
                    border: 1px solid ${isCustom ? hexToRgba(accent,'0.15') : (isLight ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,0.08)')} !important;
                    box-shadow: ${isLight ? '0 8px 32px 0 rgba(31,38,135,0.04)' : '0 8px 32px 0 rgba(0,0,0,0.2)'} !important;
                    backdrop-filter: blur(12px) !important; -webkit-backdrop-filter: blur(12px) !important;
                    color: ${text} !important; display: flex; gap: 1em; align-items: center;
                }
                ${s} ${sel.expTitleSelector} { font-size: 0.9em; font-weight: 600; margin: 0; color: ${text} !important; }
                ${s} ${sel.expCompanySelector} { font-size: 0.8em; color: ${accent} !important; font-weight: 500; }
                ${s} ${sel.expPeriodSelector} { font-size: 0.7em; color: ${isLight ? 'rgba(0,0,0,0.5)' : 'rgba(255,255,255,0.6)'} !important; font-family: var(--font-mono) !important; }
                ${s} ${sel.photoSelector} {
                    border: 3px solid ${accent};
                    border-radius: ${ avatarShape === 'circle' ? '50%' : avatarShape === 'square' ? '4px' : '20px' };
                    width: 7.5em; height: 7.5em; overflow: hidden;
                    margin: 0 auto 1.25em auto; box-shadow: 0 8px 30px rgba(0,0,0,0.15);
                }
                ${s} ${sel.photoSelector} img { width: 100%; height: 100%; object-fit: cover; }
                .social-anchor { font-weight: 500; color: ${text}99; text-decoration: none; transition: color 0.2s ease; }
                .social-anchor:hover { color: ${accent}; }

                /* Layout: Left-Aligned */
                ${s}.layout-left-aligned ${sel.heroSelector} { text-align: left !important; align-items: flex-start !important; }
                ${s}.layout-left-aligned ${sel.locationBadgeSelector} { align-self: flex-start !important; }

                /* Layout: Split (Two-Column, desktop only) */
                @media (min-width: 769px) {
                    ${s}.layout-split {
                        display: grid !important;
                        grid-template-columns: 280px 1fr !important;
                        gap: 2em !important; align-items: start !important;
                    }
                    ${s}.layout-split ${sel.splitHeroSelector} {
                        grid-column: 1 !important; position: sticky !important; top: 80px !important;
                        text-align: left !important; align-items: flex-start !important;
                    }
                    ${s}.layout-split ${sel.splitAboutSelector} { grid-column: 1 !important; }
                    ${s}.layout-split ${sel.splitColSelector} { grid-column: 2 !important; }
                    ${s}.layout-split ${sel.locationBadgeSelector} { align-self: flex-start !important; }
                }

                /* Creative A4 Paper Style */
                ${ isCreativeA4 ? `
                body { background: ${bgStyle} !important; }
                ${s} {
                    background: rgba(250,246,240,0.97) !important;
                    border: 6px double ${accent} !important;
                    outline: 2px solid ${accent}55 !important; outline-offset: -16px !important;
                    border-radius: 4px !important;
                    box-shadow: 0 12px 60px rgba(0,0,0,0.35) !important;
                    padding: 48px !important; max-width: 860px !important;
                }
                ${s} ${sel.sectionContainerSelector} {
                    background: transparent !important; border: none !important;
                    box-shadow: none !important; backdrop-filter: none !important;
                    border-radius: 0 !important;
                    border-top: 1px dashed ${accent}30 !important; padding: 1.5em 0 !important;
                }
                ${s} ${sel.expItemSelector} {
                    background: transparent !important; border: none !important;
                    box-shadow: none !important;
                    border-bottom: 1px solid ${accent}18 !important;
                    border-radius: 0 !important; padding: 0.75em 0 !important;
                }
                ` : '' }

                @media (max-width: 720px) {
                    body { padding: 4.75em 1em 2.5em; }
                    ${s} ${sel.nameSelector} { font-size: 2.15rem; }
                    ${s} ${sel.sectionContainerSelector} { padding: 24px; }
                    .social-links-row { flex-wrap: wrap; }
                }
            `;
        }

        // Function to inject styles dynamically based on template config
        function injectTemplateStyles(t, isCustom = false, customTheme = null) {
            const styleTag = document.getElementById('dynamic-template-styles');

            const font = (isCustom && customTheme) ? customTheme.font : t.font;
            const fontSize = (customTheme && customTheme.fontSize) ? customTheme.fontSize : '16px';
            const accent = (isCustom && customTheme) ? customTheme.accent : t.colors.accent;
            const text = (isCustom && customTheme) ? customTheme.text : t.colors.text;
            const cardStyle = (isCustom && customTheme) ? customTheme.cardStyle : t.cardStyle;
            const dividerStyle = (isCustom && customTheme) ? (customTheme.dividerStyle || 'dashed') : 'dashed';
            const layout = (isCustom && customTheme) ? (customTheme.layout || 'centered') : (t.layout || 'centered');
            const avatarShape = (isCustom && customTheme) ? (customTheme.avatarShape || 'circle') : (t.avatarShape || 'circle');
            const isCreativeA4 = cardStyle === 'creative-a4';
            const isGlass = cardStyle === 'glassmorphism';
            const isGlow = cardStyle === 'glow';

            // Resolve background
            let bgStyle = '';
            let bgIsImage = false;
            const rawBg = (isCustom && customTheme)
                ? (customTheme.backgroundType === 'gradient' ? null : customTheme.backgroundSolid)
                : t.colors.background;

            if (rawBg && (rawBg.startsWith('http') || rawBg.startsWith('url('))) {
                bgStyle = `url('${rawBg}') center/cover no-repeat fixed`;
                bgIsImage = true;
            } else if (isCustom && customTheme) {
                bgStyle = customTheme.backgroundType === 'gradient'
                    ? `linear-gradient(135deg, ${customTheme.backgroundGradientStart} 0%, ${customTheme.backgroundGradientEnd} 100%)`
                    : (customTheme.backgroundSolid || '#ffffff');
            } else {
                bgStyle = t.colors.background || '#ffffff';
            }

            const bgSolid = (isCustom && customTheme) ? customTheme.backgroundSolid : t.colors.background;
            const bgGradStart = (isCustom && customTheme) ? customTheme.backgroundGradientStart : t.colors.background;
            const bgType = (isCustom && customTheme) ? customTheme.backgroundType : 'solid';
            const currentBg = bgIsImage ? '#f5f0eb' : (bgType === 'solid' ? bgSolid : bgGradStart);
            const isLight = bgIsImage ? true : isColorLight(currentBg);

            document.documentElement.setAttribute('data-theme', isLight ? 'light' : 'dark');

            const blur = (isCustom && customTheme) ? customTheme.blurIntensity : '15px';
            const borderOp = (isCustom && customTheme) ? customTheme.borderOpacity : '0.08';
            const cardBgColor = (isCustom && customTheme) ? (customTheme.cardBgColor || '#ffffff') : '#ffffff';

            let cardBg = '', cardBorder = '', cardShadow = '';
            if (isCustom && customTheme) {
                cardBg = cardBgColor;
                if (isGlass) { cardBg = hexToRgba(cardBgColor, isLight ? '0.025' : '0.045'); cardBorder = `1px solid ${isLight ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,' + borderOp + ')' }`; cardShadow = 'none'; }
                else if (isGlow) { cardBorder = `1px solid ${accent}44`; cardShadow = `0 10px 30px ${accent}12, 0 0 20px ${accent}04`; }
                else if (cardStyle === 'shadow') { cardBorder = isLight ? '1px solid #e5e7eb' : '1px solid #1e293b'; cardShadow = '0 10px 25px -5px rgba(0,0,0,0.05)'; }
                else { cardBorder = isLight ? '1px solid #e5e7eb' : '1px solid #1a1d35'; cardShadow = 'none'; }
            } else {
                if (isGlass) { cardBg = isLight ? 'rgba(0,0,0,0.025)' : 'rgba(255,255,255,0.045)'; cardBorder = `1px solid ${isLight ? 'rgba(0,0,0,0.06)' : 'rgba(255,255,255,' + borderOp + ')' }`; cardShadow = 'none'; }
                else if (isGlow) { cardBg = isLight ? '#ffffff' : '#0f1220'; cardBorder = `1px solid ${accent}44`; cardShadow = `0 10px 30px ${accent}12`; }
                else if (cardStyle === 'shadow') { cardBg = isLight ? '#ffffff' : '#111322'; cardBorder = isLight ? '1px solid #e5e7eb' : '1px solid #1e293b'; cardShadow = '0 10px 25px -5px rgba(0,0,0,0.05)'; }
                else { cardBg = isLight ? '#f9fafb' : '#0e101f'; cardBorder = isLight ? '1px solid #e5e7eb' : '1px solid #1a1d35'; cardShadow = 'none'; }
            }

            const tok = { font, fontSize, accent, text, cardStyle, dividerStyle, bgStyle, bgIsImage, isLight, isCustom, isCreativeA4, cardBg, cardBorder, cardShadow, blur, hexToRgba, cardBgColor, avatarShape, layout };

            // View-portfolio selectors — map to actual HTML element classes/ids
            const sel = {
                scope: '#portfolio-root',
                heroSelector: '.portfolio-header',
                nameSelector: '#portfolio-name',
                roleSelector: '#portfolio-role',
                taglineSelector: '#portfolio-tagline',
                locationBadgeSelector: '#portfolio-location',
                aboutSelector: '#portfolio-about',
                sectionTitleSelector: '.section-title',
                sectionContainerSelector: '.portfolio-section',
                skillSelector: '.port-skill-badge',
                expItemSelector: '.timeline-card',
                expTitleSelector: '.timeline-title',
                expCompanySelector: '.timeline-company',
                expPeriodSelector: '.timeline-date',
                photoSelector: '.portfolio-avatar-container',
                socialSelector: '.social-anchor',
                splitHeroSelector: '.portfolio-header',
                splitAboutSelector: '#sec-about',
                splitColSelector: '#sec-skills, #sec-experience, #sec-education, #sec-projects, #sec-certifications, #sec-testimonials, #sec-contact',
            };

            styleTag.innerHTML = `
                body {
                    font-family: "${font}", var(--font-sans);
                    font-size: ${fontSize};
                    background: ${isCreativeA4 ? bgStyle : bgStyle};
                    color: ${text};
                    margin: 0;
                    padding: 5.5em 1.5em 4em;
                    min-height: 100vh;
                    transition: background 0.3s ease, color 0.3s ease;
                }
                #portfolio-root {
                    max-width: 900px; margin: 0 auto;
                    display: flex; flex-direction: column; gap: 2.25em;
                }
                ${buildPortfolioCSS(sel, tok)}
            `;
        }
    
    </script>
