<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup // Apex SkillSpace</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/core.css">
    <link rel="stylesheet" href="css/auth.css">
</head>

<body>

    <!-- Background Collage -->
    <div class="auth-collage-bg">
        <div class="auth-collage-col">
            <img src="assets/11.webp" alt="">
            <img src="assets/14.webp" alt="">
            <img src="assets/16.webp" alt="">
        </div>

        <div class="auth-collage-col">
            <img src="assets/12.webp" alt="">
            <img src="assets/16.webp" alt="">
            <img src="assets/13.webp" alt="">
        </div>

        <div class="auth-collage-col">
            <img src="assets/11.webp" alt="">
            <img src="assets/14.webp" alt="">
            <img src="assets/16.webp" alt="">
        </div>

        <div class="auth-collage-col">
            <img src="assets/11.webp" alt="">
            <img src="assets/14.webp" alt="">
            <img src="assets/17.webp" alt="">
        </div>

        <div class="auth-collage-col">
            <img src="assets/19.webp" alt="">
            <img src="assets/17.webp" alt="">
            <img src="assets/18.webp" alt="">
        </div>
    </div>

    <!-- Overlay -->
    <div class="auth-overlay"></div>

    <!-- Signup Container -->
    <div class="auth-container">

        <div class="auth-card">

            <div class="auth-header">

                <a href="index.html" class="auth-logo">
                    <img src="logo.png" alt="Apex Logo">
                    <span class="auth-logo-text">
                        Apex
                    </span>
                </a>

                <h1 class="auth-title">
                    Create Account
                </h1>

                <p class="auth-subtitle">
                    Start building and selling your portfolio.
                </p>

            </div>

            <!-- Error Message -->
            <div id="auth-error"
                class="auth-error-msg">
            </div>

            <form id="signup-form">

                <div class="auth-form-group">

                    <label class="auth-label">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="signup-name"
                        class="auth-input"
                        placeholder="John Doe"
                        required>

                </div>

                <div class="auth-form-group">

                    <label class="auth-label">
                        Email Address
                    </label>

                    <input
                        type="email"
                        id="signup-email"
                        class="auth-input"
                        placeholder="you@example.com"
                        required>

                </div>

                <div class="auth-form-group">

                    <label class="auth-label">
                        Password
                    </label>

                    <input
                        type="password"
                        id="signup-pass"
                        class="auth-input"
                        placeholder="••••••••"
                        required>

                </div>

                <div class="auth-form-group">

                    <label class="auth-label">
                        Confirm Password
                    </label>

                    <input
                        type="password"
                        id="signup-confirm"
                        class="auth-input"
                        placeholder="••••••••"
                        required>

                </div>

                <button
                    type="submit"
                    class="auth-btn">

                    Create Account

                </button>

            </form>

            <div class="auth-footer">

                Already have an account?

                <a href="login.html"
                    class="auth-link">

                    Login

                </a>

            </div>

        </div>

    </div>

    <script type="module">

        import {
            redirectIfLoggedIn,
            registerUser
        } from './js/auth.js';

        redirectIfLoggedIn();

        document
        .getElementById('signup-form')
        .addEventListener(
            'submit',
            function(e){

                e.preventDefault();

                const name =
                document.getElementById(
                    'signup-name'
                ).value;

                const email =
                document.getElementById(
                    'signup-email'
                ).value;

                const pass =
                document.getElementById(
                    'signup-pass'
                ).value;

                const confirm =
                document.getElementById(
                    'signup-confirm'
                ).value;

                const errorDiv =
                document.getElementById(
                    'auth-error'
                );

                errorDiv.classList.remove(
                    'visible'
                );

                if(pass !== confirm){

                    errorDiv.textContent =
                    "Passwords do not match";

                    errorDiv.classList.add(
                        'visible'
                    );

                    return;
                }

                registerUser(
                    name,
                    email,
                    pass
                );

            });

    </script>

</body>
</html>
